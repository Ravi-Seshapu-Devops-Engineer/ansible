- name: demo on filtrs
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ANsible, terraform
    tagslist:
      name: Ravi
      project: roboshop
      component: ansible
  
  tasks:
  - name: Greeting
    ansible.builtin.debug:
      msg: "Hi Ravi, {{GREETING | default('Good Morning')}}"

  - name: string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"

  - name: converting dict to list
    ansible.builtin.debug:
      msg: "{{ tagslist | dict2items }}"