- name: installing and deleting packages
  hosts: local
  connection: local
  tasks:
  - name: installing and deleting packages
    ansible.builtin.package:
      name: '{{item.name}}'
      state: '{{item.state}}'
    loop:
    - { name: "mysql", state: "absent" }
    - { name: "nginx", state: "absent" }
    - { name: "zip", state: "present" }